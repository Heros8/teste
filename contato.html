<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

  <header class="topo">
    <div>
      <p class="tag">🎬 Meu Site de Cinema</p>
      <h1>Contato</h1>
    </div>

    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="contato.html" class="ativo">Contato</a>
    </nav>
  </header>

  <main class="container">

    <section class="form-area">
      <h2>Envie uma mensagem</h2>

      <form class="formulario" onsubmit="enviarFormulario(event)">

        <label>Nome</label>
        <input type="text" id="nome" required>

        <label>E-mail</label>
        <input type="email" id="email" required>

        <label>Mensagem</label>
        <textarea id="mensagem" rows="5" required></textarea>

        <button type="submit" class="botao">
          Enviar
        </button>

      </form>

      <p id="resposta-formulario" class="mensagem-magica"></p>

    </section>

  </main>

</body>
</html>
